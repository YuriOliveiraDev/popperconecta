name: Deploy via FTP

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy changed files to FTP
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          BEFORE="${{ github.event.before }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git ls-files -- public_html/ | sed 's|^public_html/||')
          else
            CHANGED=$(git diff --name-only "$BEFORE" HEAD -- public_html/ | sed 's|^public_html/||')
          fi

          if [ -z "$CHANGED" ]; then
            echo "No changes in public_html/ — nothing to deploy"
            exit 0
          fi

          echo "=== Files to deploy ==="
          echo "$CHANGED"
          echo "======================"

          SUCCESS=0
          FAILED=0

          while IFS= read -r file; do
            local_path="public_html/$file"
            remote_path="/public_html/$file"

            if [ ! -f "$local_path" ]; then
              echo "SKIP (deleted): $file"
              continue
            fi

            echo "Uploading: $file"
            if curl --ftp-create-dirs \
                     --retry 5 \
                     --retry-delay 3 \
                     -T "$local_path" \
                     "ftp://$FTP_HOST:$FTP_PORT$remote_path" \
                     --user "$FTP_USER:$FTP_PASS" \
                     --silent --show-error; then
              SUCCESS=$((SUCCESS + 1))
            else
              echo "FAILED: $file"
              FAILED=$((FAILED + 1))
            fi
          done <<< "$CHANGED"

          echo "=== Deploy: $SUCCESS ok, $FAILED failed ==="
          [ $FAILED -eq 0 ]
