name: Deploy via FTP

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy changed files to FTP
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          cat > /tmp/deploy.py << 'PYEOF'
          import os, sys, time, subprocess
          from ftplib import FTP, all_errors

          host     = os.environ['FTP_HOST']
          port     = int(os.environ.get('FTP_PORT', '21'))
          user     = os.environ['FTP_USER']
          password = os.environ['FTP_PASS']
          before   = os.environ.get('BEFORE_SHA', '')

          ZERO = '0' * 40
          if before in (ZERO, ''):
              result = subprocess.run(['git', 'ls-files', '--', 'public_html/'], capture_output=True, text=True)
          else:
              result = subprocess.run(['git', 'diff', '--name-only', before, 'HEAD', '--', 'public_html/'], capture_output=True, text=True)

          files = [f[len('public_html/'):] for f in result.stdout.strip().split('\n') if f.startswith('public_html/')]
          files = [f for f in files if f]

          if not files:
              print('No changes in public_html/ — nothing to deploy')
              sys.exit(0)

          print(f'=== Files to deploy ({len(files)}) ===')
          for f in files:
              print(f'  {f}')

          def make_ftp():
              ftp = FTP()
              ftp.connect(host, port, timeout=120)
              ftp.login(user, password)
              ftp.set_pasv(True)
              return ftp

          def ensure_dir(ftp, remote_dir):
              parts = remote_dir.strip('/').split('/')
              path = ''
              for part in parts:
                  if not part:
                      continue
                  path += '/' + part
                  try:
                      ftp.mkd(path)
                  except Exception:
                      pass

          def upload_file(ftp, local_path, remote_path, max_retries=8):
              for attempt in range(max_retries):
                  try:
                      ensure_dir(ftp, os.path.dirname(remote_path))
                      with open(local_path, 'rb') as f:
                          ftp.storbinary(f'STOR {remote_path}', f, blocksize=4096)
                      return True, ftp
                  except all_errors as e:
                      print(f'  Attempt {attempt+1}/{max_retries} failed: {e}')
                      if attempt < max_retries - 1:
                          wait = min(60, 10 * (attempt + 1))
                          print(f'  Reconnecting in {wait}s...')
                          time.sleep(wait)
                          try:
                              ftp.quit()
                          except Exception:
                              pass
                          try:
                              ftp = make_ftp()
                          except Exception as e2:
                              print(f'  Reconnect failed: {e2}')
              return False, ftp

          ftp = make_ftp()
          success = 0
          failed  = 0

          for file in files:
              local_path  = f'public_html/{file}'
              remote_path = f'/public_html/{file}'

              if not os.path.isfile(local_path):
                  print(f'SKIP (deleted): {file}')
                  continue

              size = os.path.getsize(local_path)
              print(f'Uploading: {file} ({size:,} bytes)')
              ok, ftp = upload_file(ftp, local_path, remote_path)
              if ok:
                  print('  OK')
                  success += 1
              else:
                  print('  FAILED after all retries')
                  failed += 1

          try:
              ftp.quit()
          except Exception:
              pass

          print(f'=== Deploy: {success} ok, {failed} failed ===')
          sys.exit(0 if failed == 0 else 1)
          PYEOF
          python3 /tmp/deploy.py
