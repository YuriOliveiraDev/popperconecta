name: Deploy via FTP

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: public_html/
          server-dir: /public_html/
          state-name: .ftp-state-v2.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/.env*
            **/*.log
            **/tmp/**
            **/cache/**
            **/node_modules/**
            **/vendor/**
            logs/**
            CLAUDE.md
            agents.md
            DOCUMENTACAO.txt
            .agents/**
            uploads/**
            admin/uploads/**
