name: Deploy via FTP

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_SERVER:21" <<'EOF'
          set ftp:ssl-allow no
          set ftp:passive-mode true
          set net:timeout 30
          set net:max-retries 10
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 60
          set xfer:clobber on
          set cmd:fail-exit yes
          mirror --reverse --verbose --only-newer --parallel=2 \
            --exclude-glob .git* \
            --exclude-glob .github/** \
            --exclude-glob .env* \
            --exclude-glob *.log \
            --exclude-glob tmp/** \
            --exclude-glob cache/** \
            --exclude-glob node_modules/** \
            --exclude-glob vendor/** \
            --exclude-glob logs/** \
            --exclude-glob CLAUDE.md \
            --exclude-glob agents.md \
            --exclude-glob .agents/** \
            --exclude-glob uploads/** \
            --exclude-glob admin/uploads/** \
            ./public_html/ /public_html/
          bye
          EOF
