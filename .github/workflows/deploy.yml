name: Deploy via FTP

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: FTP Deploy Locaweb
        uses: locaweb/ftp-deploy@1.0.0
        with:
          host: ${{ secrets.FTP_SERVER }}
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          localDir: "public_html"
          remoteDir: "public_html"
          forceSsl: false
          options: "--parallel=1 --verbose --exclude-glob .git* --exclude-glob .github/** --exclude-glob .env* --exclude-glob *.log --exclude-glob tmp/** --exclude-glob cache/** --exclude-glob node_modules/** --exclude-glob vendor/** --exclude-glob logs/** --exclude-glob CLAUDE.md --exclude-glob agents.md --exclude-glob .agents/** --exclude-glob uploads/** --exclude-glob admin/uploads/**"
