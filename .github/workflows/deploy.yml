name: Deploy via FTP

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
          set ftp:ssl-allow false;
          set ftp:ssl-force false;
          set ssl:verify-certificate false;
          set ftp:passive-mode true;
          set ftp:prefer-epsv false;
          set net:timeout 60;
          set net:max-retries 1;
          set net:reconnect-interval-base 5;
          set net:reconnect-interval-max 15;
          set xfer:clobber on;
          debug 3;
          open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"ftp://$FTP_SERVER\";
          mirror --reverse --verbose --parallel=1 \
            --exclude-glob .git* \
            --exclude-glob .github/** \
            --exclude-glob .env* \
            --exclude-glob *.log \
            --exclude-glob tmp/** \
            --exclude-glob cache/** \
            --exclude-glob node_modules/** \
            --exclude-glob vendor/** \
            --exclude-glob logs/** \
            --exclude-glob CLAUDE.md \
            --exclude-glob agents.md \
            --exclude-glob DOCUMENTACAO.txt \
            --exclude-glob .agents/** \
            --exclude-glob uploads/** \
            --exclude-glob admin/uploads/** \
            public_html .;
          bye
          "
